<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>氣球心算注意力挑戰 V14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
            height: 100vh;
            margin: 0;
            user-select: none;
            touch-action: none; /* 防止手機手勢干擾遊戲 */
        }

        /* 氣球動畫層 */
        .balloon-wrapper {
            position: absolute;
            bottom: -150px;
            z-index: 10; /* 低於 UI 層 */
            animation: rise linear forwards;
        }

        .wobble-layer {
            animation: wobble 3s ease-in-out infinite;
        }

        .balloon {
            width: 70px;
            height: 90px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.25rem;
            box-shadow: inset -8px -8px 15px rgba(0,0,0,0.1), 5px 5px 12px rgba(0,0,0,0.1);
            cursor: pointer;
            position: relative;
        }

        @media (min-width: 768px) {
            .balloon { width: 85px; height: 110px; font-size: 1.5rem; }
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 35px;
            background: rgba(0,0,0,0.2);
        }

        .balloon-blue { background-color: #3B82F6; }
        .balloon-red { background-color: #EF4444; }
        .balloon-yellow { background-color: #F59E0B; color: #451a03; }

        @keyframes rise {
            from { bottom: -150px; }
            to { bottom: 115vh; }
        }

        @keyframes wobble {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(20px); }
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        /* 暫停控制 */
        .paused .balloon-wrapper,
        .paused .wobble-layer {
            animation-play-state: paused !important;
        }
        
        .paused .balloon { pointer-events: none; }

        .popped {
            animation: pop 0.2s ease-out forwards !important;
            pointer-events: none;
        }

        .modal-bg {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
        }

        /* 讓 UI 永遠在最上層 */
        #game-ui {
            z-index: 100;
        }
        #countdown-overlay {
            z-index: 90;
        }
    </style>
</head>
<body>

    <div id="app-root" class="relative w-full h-full">
        
        <!-- 主選單畫面 -->
        <div id="menu-screen" class="absolute inset-0 flex items-center justify-center z-[150] p-4 bg-sky-100/50">
            <div class="bg-white p-6 md:p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-gray-100 flex flex-col max-h-full overflow-y-auto">
                <h1 class="text-2xl md:text-3xl font-bold text-blue-600 mb-1">氣球心算注意力挑戰</h1>
                <p id="lib-count-text" class="text-xs text-gray-400 mb-6 font-bold">目前題庫：132 個國字</p>
                
                <div class="space-y-4 text-left mb-6">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">關卡時間 (秒)</label>
                            <input type="number" id="input-game-time" value="30" class="w-full border-2 border-gray-100 rounded-xl p-2 mt-1 outline-none focus:border-blue-400">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">氣球總數</label>
                            <input type="number" id="input-total-balloons" value="15" class="w-full border-2 border-gray-100 rounded-xl p-2 mt-1 outline-none focus:border-blue-400">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase">飄浮速度: <span id="display-speed">8</span>s</label>
                        <input type="range" id="input-speed-range" min="2" max="15" step="1" value="8" class="w-full h-2 bg-blue-100 rounded-lg appearance-none mt-1">
                    </div>

                    <!-- 修正：補回數字範圍輸入框 -->
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase">數字範圍 (1 ~ X)</label>
                        <input type="number" id="input-max-num" value="10" min="1" class="w-full border-2 border-gray-100 rounded-xl p-2 mt-1 outline-none focus:border-blue-400">
                    </div>

                    <div class="p-3 bg-orange-50 rounded-xl border border-orange-100">
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" id="input-advanced-mode" class="w-5 h-5 text-orange-500 rounded">
                            <span class="text-sm font-bold text-orange-600">進階模式 (記憶國字氣球)</span>
                        </label>
                        <div id="setting-word-count" class="hidden flex items-center justify-between mt-3 pl-6">
                            <div class="flex items-center space-x-2">
                                <span class="text-xs text-gray-500 font-bold">字數:</span>
                                <input type="number" id="input-target-word-count" value="3" class="w-12 border rounded p-1 text-center text-xs">
                            </div>
                            <button id="btn-open-lib" class="text-[10px] bg-orange-200 text-orange-700 px-3 py-1.5 rounded-lg font-bold">編輯題庫</button>
                        </div>
                    </div>
                </div>

                <button id="btn-start" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg transition active:scale-95 text-lg mb-4">
                    開始挑戰
                </button>
                
                <div class="pt-4 border-t border-gray-100">
                    <a href="https://www.facebook.com/mpotkevin" target="_blank" class="text-xs text-blue-400 font-bold flex items-center justify-center">
                        設計：職能治療師 - 鄭凱文
                    </a>
                </div>
            </div>
        </div>

        <!-- 題庫管理 -->
        <div id="lib-screen" class="hidden absolute inset-0 flex items-center justify-center z-[200] modal-bg p-4">
            <div class="bg-white p-5 rounded-3xl shadow-2xl w-full max-w-lg flex flex-col max-h-[90vh]">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-gray-800">國字題庫管理</h2>
                    <button id="btn-close-lib" class="text-gray-400 text-3xl font-bold">&times;</button>
                </div>
                <div class="flex space-x-2 mb-4">
                    <input type="text" id="input-new-word" maxlength="1" placeholder="填字" class="flex-grow border-2 border-gray-100 rounded-xl p-2 text-center">
                    <button id="btn-add-word" class="bg-orange-500 text-white px-6 py-2 rounded-xl font-bold">新增</button>
                </div>
                <div id="word-list" class="grid grid-cols-5 sm:grid-cols-8 gap-2 overflow-y-auto p-2 bg-gray-50 rounded-2xl flex-grow"></div>
            </div>
        </div>

        <!-- 遊戲畫布 -->
        <div id="game-canvas" class="w-full h-full relative overflow-hidden"></div>

        <!-- 操作 UI -->
        <div id="game-ui" class="hidden absolute top-0 left-0 w-full p-4 flex justify-between items-start pointer-events-none">
            <div class="space-y-2 pointer-events-auto">
                <div id="timer-ui" class="bg-white/90 px-4 py-2 rounded-xl font-bold text-blue-600 shadow-md border border-blue-200 text-sm">時間: --s</div>
                <div id="progress-ui" class="bg-white/90 px-4 py-2 rounded-xl font-bold text-purple-600 shadow-md border border-purple-200 text-sm">進度: 0 / 0</div>
            </div>
            <div class="flex space-x-2 pointer-events-auto">
                <button id="btn-pause" class="bg-yellow-500 text-white px-5 py-3 rounded-xl font-bold shadow-lg text-sm active:bg-yellow-600">暫停</button>
                <button id="btn-stop" class="bg-red-500 text-white px-5 py-3 rounded-xl font-bold shadow-lg text-sm active:bg-red-600">結束</button>
            </div>
        </div>

        <div id="countdown-overlay" class="hidden absolute inset-0 flex items-center justify-center text-9xl font-bold text-blue-500 pointer-events-none"></div>

        <!-- 結算畫面 -->
        <div id="result-screen" class="hidden absolute inset-0 flex items-center justify-center z-[150] modal-bg p-4">
            <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
                <h2 class="text-xl font-bold mb-6">請輸入答案</h2>
                <div class="space-y-4 text-left">
                    <input type="number" id="ans-sum" placeholder="總和數字" class="w-full border-2 border-gray-100 rounded-xl p-4 text-xl font-bold">
                    <div id="ans-words-container" class="hidden">
                        <input type="text" id="ans-words" placeholder="國字順序" class="w-full border-2 border-gray-100 rounded-xl p-4 text-xl font-bold">
                    </div>
                </div>
                <button id="btn-verify" class="w-full mt-6 bg-green-500 text-white font-bold py-4 rounded-xl shadow-lg">提交</button>
            </div>
        </div>

        <!-- 結果反饋 -->
        <div id="feedback-screen" class="hidden absolute inset-0 flex items-center justify-center z-[160] modal-bg p-4">
            <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
                <div id="res-icon" class="text-6xl mb-4">🎉</div>
                <h2 id="res-title" class="font-bold text-xl mb-4">結果</h2>
                <div id="res-body" class="text-left bg-gray-50 p-4 rounded-xl mb-6 space-y-2"></div>
                <button id="btn-restart" class="w-full bg-blue-500 text-white font-bold py-4 rounded-xl">返回主選單</button>
            </div>
        </div>
    </div>

    <script>
        // --- 題庫與狀態 ---
        let chineseLibrary = ["天", "地", "人", "水", "火", "木", "金", "山", "海", "雲", "風", "月", "日", "光", "星", "花", "鳥", "石", "川", "龍", "虎", "雨", "電", "心", "夢", "森", "林", "湖", "泉", "冰", "雪", "霧", "露", "霜", "霄", "霆", "震", "虹", "霓", "霞", "魚", "蝦", "蟹", "蛇", "鹿", "象", "馬", "牛", "羊", "雞", "犬", "豕", "貓", "鼠", "兔", "東", "西", "南", "北", "上", "下", "左", "右", "中", "紅", "橙", "黃", "綠", "藍", "靛", "紫", "黑", "白", "青", "灰", "褐", "仁", "義", "禮", "智", "信", "忠", "孝", "愛", "和", "平", "誠", "勇", "春", "夏", "秋", "冬", "晨", "昏", "晝", "夜", "銀", "銅", "鐵", "錫", "珠", "寶", "玉", "翠", "大", "小", "長", "短", "高", "低", "寬", "窄", "文", "武", "詩", "書", "琴", "棋", "畫", "劍", "盾", "神", "仙", "鬼", "佛", "聖", "賢", "酒", "茶", "飯", "菜"];

        const UI = {
            menu: document.getElementById('menu-screen'),
            libScreen: document.getElementById('lib-screen'),
            canvas: document.getElementById('game-canvas'),
            uiLayer: document.getElementById('game-ui'),
            countdown: document.getElementById('countdown-overlay'),
            result: document.getElementById('result-screen'),
            feedback: document.getElementById('feedback-screen'),
            ansWordsCont: document.getElementById('ans-words-container'),
            timer: document.getElementById('timer-ui'),
            progress: document.getElementById('progress-ui'),
            speedLabel: document.getElementById('display-speed'),
            wordList: document.getElementById('word-list'),
            libCountText: document.getElementById('lib-count-text'),
            pauseBtn: document.getElementById('btn-pause'),
            stopBtn: document.getElementById('btn-stop'),
            startBtn: document.getElementById('btn-start'),
            verifyBtn: document.getElementById('btn-verify'),
            restartBtn: document.getElementById('btn-restart'),
            openLibBtn: document.getElementById('btn-open-lib'),
            closeLibBtn: document.getElementById('btn-close-lib'),
            addWordBtn: document.getElementById('btn-add-word'),
            newWordInput: document.getElementById('input-new-word')
        };

        const INPUTS = {
            gameTime: document.getElementById('input-game-time'),
            totalBalloons: document.getElementById('input-total-balloons'),
            speed: document.getElementById('input-speed-range'),
            maxNum: document.getElementById('input-max-num'), // 修正：確保在此引用
            advanced: document.getElementById('input-advanced-mode'),
            wordCount: document.getElementById('input-target-word-count'),
            ansSum: document.getElementById('ans-sum'),
            ansWords: document.getElementById('ans-words')
        };

        let state = {
            gameActive: false, isPaused: false, timeLeft: 0,
            actualSum: 0, actualWords: [], spawnedCount: 0,
            totalToSpawn: 0, targetWords: 0, currentWordsCount: 0,
            timerIds: [], intervalIds: []
        };

        // --- 題庫管理 ---
        function renderWordList() {
            UI.wordList.innerHTML = '';
            chineseLibrary.forEach((word, index) => {
                const div = document.createElement('div');
                div.className = 'relative bg-white border rounded-lg p-2 text-center font-bold h-10 flex items-center justify-center';
                div.innerText = word;
                const delBtn = document.createElement('button');
                delBtn.className = 'absolute -top-1 -right-1 bg-red-400 text-white rounded-full w-4 h-4 text-[10px]';
                delBtn.innerText = '✕';
                delBtn.onclick = (e) => { chineseLibrary.splice(index, 1); renderWordList(); updateLibInfo(); };
                div.appendChild(delBtn);
                UI.wordList.appendChild(div);
            });
        }
        function updateLibInfo() { UI.libCountText.innerText = `目前題庫：${chineseLibrary.length} 個國字`; }
        UI.openLibBtn.onclick = () => { renderWordList(); UI.libScreen.classList.remove('hidden'); };
        UI.closeLibBtn.onclick = () => UI.libScreen.classList.add('hidden');
        UI.addWordBtn.onclick = () => {
            const word = UI.newWordInput.value.trim();
            if (word && word.length === 1 && !chineseLibrary.includes(word)) {
                chineseLibrary.unshift(word); UI.newWordInput.value = ''; renderWordList(); updateLibInfo();
            }
        };

        // --- 核心邏輯 ---
        INPUTS.speed.oninput = (e) => UI.speedLabel.innerText = e.target.value;
        INPUTS.advanced.onchange = (e) => document.getElementById('setting-word-count').classList.toggle('hidden', !e.target.checked);

        function clearAll() {
            state.timerIds.forEach(id => clearTimeout(id));
            state.intervalIds.forEach(id => clearInterval(id));
            state.timerIds = []; state.intervalIds = [];
        }
        function trackT(fn, d) { state.timerIds.push(setTimeout(fn, d)); }
        function trackI(fn, d) { state.intervalIds.push(setInterval(fn, d)); }

        UI.startBtn.onclick = () => { UI.menu.classList.add('hidden'); countdown(); };

        function countdown() {
            UI.countdown.classList.remove('hidden');
            let c = 3; UI.countdown.innerText = c;
            const itv = setInterval(() => {
                c--;
                if (c > 0) UI.countdown.innerText = c;
                else { clearInterval(itv); UI.countdown.classList.add('hidden'); if (!state.gameActive) start(); }
            }, 1000);
        }

        function start() {
            state.gameActive = true; state.isPaused = false;
            state.actualSum = 0; state.actualWords = []; state.spawnedCount = 0; state.currentWordsCount = 0;
            state.totalToSpawn = parseInt(INPUTS.totalBalloons.value) || 15;
            state.timeLeft = parseInt(INPUTS.gameTime.value) || 30;
            state.targetWords = INPUTS.advanced.checked ? (parseInt(INPUTS.wordCount.value) || 3) : 0;
            
            UI.canvas.innerHTML = ''; UI.uiLayer.classList.remove('hidden'); updateUI();
            trackI(() => { if (!state.isPaused && state.gameActive) { state.timeLeft--; updateUI(); if (state.timeLeft <= 0) finish(); } }, 1000);
            const interval = (state.timeLeft * 0.9 * 1000) / state.totalToSpawn;
            loop(interval);
        }

        function loop(iv) {
            if (!state.gameActive) return;
            trackT(() => {
                if (!state.isPaused && state.gameActive && state.spawnedCount < state.totalToSpawn) spawn();
                if (state.gameActive && state.spawnedCount < state.totalToSpawn) loop(iv);
            }, iv);
        }

        function spawn() {
            state.spawnedCount++; updateUI();
            const wrap = document.createElement('div'); wrap.className = 'balloon-wrapper';
            const wobble = document.createElement('div'); wobble.className = 'wobble-layer';
            const b = document.createElement('div');
            let t = Math.random() > 0.5 ? 'blue' : 'red';
            
            // 修正：使用預先定義的 INPUTS 變數，並加上防呆機制
            const maxVal = INPUTS.maxNum ? (parseInt(INPUTS.maxNum.value) || 10) : 10;
            const v = Math.floor(Math.random() * maxVal) + 1;

            if (INPUTS.advanced.checked && state.currentWordsCount < state.targetWords) {
                if (Math.random() < (state.targetWords - state.currentWordsCount) / (state.totalToSpawn - state.spawnedCount + 1)) t = 'yellow';
            }
            b.className = `balloon balloon-${t}`;
            if (t === 'blue') { b.innerText = `+${v}`; state.actualSum += v; }
            else if (t === 'red') { b.innerText = `-${v}`; state.actualSum -= v; }
            else { 
                const w = chineseLibrary.length > 0 ? chineseLibrary[Math.floor(Math.random() * chineseLibrary.length)] : "A";
                b.innerText = w; state.actualWords.push(w); state.currentWordsCount++; 
            }
            b.onclick = () => { if (!state.isPaused && state.gameActive) { b.classList.add('popped'); setTimeout(() => { if (wrap.parentNode) UI.canvas.removeChild(wrap); check(); }, 200); } };
            wrap.style.left = (Math.random() * (window.innerWidth - 80) + 10) + 'px';
            wrap.style.animationDuration = INPUTS.speed.value + 's';
            wobble.style.animationDuration = (Math.random() * 2 + 2) + 's';
            wobble.appendChild(b); wrap.appendChild(wobble); UI.canvas.appendChild(wrap);
            wrap.onanimationend = () => { if (wrap.parentNode) UI.canvas.removeChild(wrap); check(); };
        }

        function check() { if (state.gameActive && state.spawnedCount >= state.totalToSpawn && UI.canvas.children.length === 0) finish(); }
        function updateUI() { UI.timer.innerText = `時間: ${state.timeLeft}s`; UI.progress.innerText = `進度: ${state.spawnedCount} / ${state.totalToSpawn}`; }
        UI.stopBtn.onclick = () => reset();
        function reset() { state.gameActive = false; clearAll(); UI.canvas.innerHTML = ''; UI.uiLayer.classList.add('hidden'); UI.result.classList.add('hidden'); UI.feedback.classList.add('hidden'); UI.menu.classList.remove('hidden'); UI.pauseBtn.innerText = "暫停"; }
        function finish() { state.gameActive = false; clearAll(); UI.uiLayer.classList.add('hidden'); UI.canvas.innerHTML = ''; INPUTS.ansSum.value = ''; INPUTS.ansWords.value = ''; UI.result.classList.remove('hidden'); UI.ansWordsCont.classList.toggle('hidden', !INPUTS.advanced.checked); }

        UI.pauseBtn.onclick = function() {
            if (!state.gameActive) return;
            state.isPaused = !state.isPaused;
            UI.canvas.classList.toggle('paused', state.isPaused);
            this.innerText = state.isPaused ? "繼續" : "暫停";
        };

        UI.verifyBtn.onclick = () => {
            const uS = parseInt(INPUTS.ansSum.value); const uW = INPUTS.ansWords.value.trim();
            const sO = uS === state.actualSum; const wO = !INPUTS.advanced.checked || (uW === state.actualWords.join(''));
            UI.result.classList.add('hidden'); UI.feedback.classList.remove('hidden');
            document.getElementById('res-icon').innerText = (sO && wO) ? "🏆" : (sO || wO ? "🥈" : "😅");
            document.getElementById('res-body').innerHTML = `<div class="flex justify-between"><span>正確總和:</span><span class="font-bold ${sO?'text-green-600':'text-red-600'}">${state.actualSum}</span></div>${INPUTS.advanced.checked?`<hr><div class="text-sm">正確國字: <span class="font-bold">${state.actualWords.join('')}</span></div>`:''}`;
        };
        UI.restartBtn.onclick = () => UI.feedback.classList.add('hidden'); UI.menu.classList.remove('hidden');
    </script>
</body>
</html>
