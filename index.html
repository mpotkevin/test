<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自製拼圖產生器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .step-card {
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .step-card.active {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .step-card.disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(1);
        }
        
        #preview-container {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 確保 Canvas 在手機上正確縮放 */
        canvas {
            max-width: 100% !important;
            height: auto !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            background-color: white;
            display: block;
        }

        input[type="range"] { accent-color: #3b82f6; height: 1.5rem; }
        .export-option:checked + label {
            background-color: #eff6ff;
            border-color: #3b82f6;
            color: #1e40af;
        }
    </style>
</head>
<body class="flex flex-col md:h-screen md:overflow-hidden min-h-screen">

    <!-- 頂部標題列 -->
    <header class="h-16 flex-none bg-white border-b border-slate-200 px-6 flex items-center justify-between z-50 sticky top-0">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black text-xl shadow-sm">P</div>
            <h1 class="text-xl font-bold tracking-tight">自製拼圖產生器</h1>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-y-auto md:overflow-hidden">
        
        <!-- 左側控制區 (手機端在上方，電腦端在左側) -->
        <aside class="w-full md:w-[380px] flex-none border-r border-slate-200 bg-slate-50 overflow-y-auto p-4 md:p-6 space-y-6 z-30">
            
            <div class="space-y-6 pb-8">
                <!-- Step 1: 上傳 -->
                <section id="section-1" class="step-card active p-5 rounded-2xl bg-white border border-slate-200">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="w-6 h-6 rounded-full bg-blue-600 text-white text-xs flex items-center justify-center font-bold">1</span>
                        <h2 class="font-bold text-slate-800">上傳圖片</h2>
                    </div>
                    <div id="drop-zone" class="relative group border-2 border-dashed border-slate-200 rounded-xl p-4 transition-all hover:border-blue-400 hover:bg-blue-50 cursor-pointer text-center">
                        <input type="file" id="img-input" class="hidden" accept="image/*" onchange="handleFile(this.files[0])">
                        <div id="upload-placeholder">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mx-auto text-slate-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <p class="text-sm font-medium text-slate-600">點擊上傳圖片</p>
                        </div>
                        <div id="file-info" class="hidden text-sm text-blue-600 font-bold truncate italic"></div>
                    </section>

                <!-- Step 2: 設定 -->
                <section id="section-2" class="step-card disabled p-5 rounded-2xl bg-white border border-slate-200">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="w-6 h-6 rounded-full bg-blue-600 text-white text-xs flex items-center justify-center font-bold">2</span>
                        <h2 class="font-bold text-slate-800">參數設定</h2>
                    </div>

                    <div class="space-y-5">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">切割樣式</label>
                                <div class="flex gap-1 p-1 bg-slate-100 rounded-lg">
                                    <button onclick="updateState({mode: 'grid'})" id="btn-grid" class="flex-1 py-1.5 text-xs rounded bg-white shadow-sm font-bold text-blue-600 transition-all">網格</button>
                                    <button onclick="updateState({mode: 'slant'})" id="btn-slant" class="flex-1 py-1.5 text-xs rounded text-slate-500 hover:bg-white/50 font-medium transition-all">斜線</button>
                                </div>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">圖片旋轉</label>
                                <button onclick="rotateImage()" class="w-full h-8 flex items-center justify-center gap-2 border border-slate-200 rounded-lg text-[10px] font-bold text-slate-600 hover:bg-slate-50 transition bg-white">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                    </svg>
                                    旋轉 90°
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">線條顏色</label>
                                <input type="color" id="input-color" value="#000000" oninput="updateState({lineColor: this.value})" class="w-full h-8 rounded border-none cursor-pointer bg-transparent">
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">PDF 方向</label>
                                <div class="flex gap-1 p-1 bg-slate-100 rounded-lg">
                                    <button onclick="updateState({pdfOrientation: 'p'})" id="btn-port" class="flex-1 py-1.5 text-[10px] rounded bg-white shadow-sm font-bold text-blue-600">直式</button>
                                    <button onclick="updateState({pdfOrientation: 'l'})" id="btn-land" class="flex-1 py-1.5 text-[10px] rounded text-slate-500 hover:bg-white/50 font-medium">橫式</button>
                                </div>
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">線條粗細</label>
                                <span id="label-thickness" class="text-sm font-bold text-blue-600">5px</span>
                            </div>
                            <input type="range" min="0.5" max="20" step="0.5" value="5" oninput="updateState({thickness: this.value})" class="w-full cursor-pointer">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <div class="flex justify-between items-end mb-2">
                                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">橫向片數</label>
                                    <span id="label-cols" class="text-sm font-bold text-blue-600">4</span>
                                </div>
                                <input type="range" min="2" max="25" value="4" oninput="updateState({cols: this.value})" class="w-full cursor-pointer">
                            </div>
                            <div>
                                <div class="flex justify-between items-end mb-2">
                                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">縱向片數</label>
                                    <span id="label-rows" class="text-sm font-bold text-blue-600">4</span>
                                </div>
                                <input type="range" min="2" max="25" value="4" oninput="updateState({rows: this.value})" class="w-full cursor-pointer">
                            </div>
                        </div>
                        <button onclick="state.seed = Math.random(); draw();" class="w-full py-2.5 border border-slate-200 rounded-lg text-[10px] font-bold text-slate-400 hover:bg-slate-50 active:bg-slate-100 transition uppercase tracking-widest">重新隨機路徑</button>
                    </div>
                </section>

                <!-- Step 3: 下載 -->
                <section id="section-3" class="step-card disabled p-5 rounded-2xl bg-white border border-slate-200">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="w-6 h-6 rounded-full bg-blue-600 text-white text-xs flex items-center justify-center font-bold">3</span>
                        <h2 class="font-bold text-slate-800">匯出檔案</h2>
                    </div>
                    
                    <div class="mb-4">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">匯出內容</label>
                        <div class="flex gap-2">
                            <div class="flex-1">
                                <input type="radio" id="export-both" name="export-scope" value="both" checked class="hidden export-option" onchange="state.exportScope = 'both'">
                                <label for="export-both" class="block text-center py-2 text-[10px] font-bold rounded-lg border border-slate-200 cursor-pointer text-slate-500 transition-all">全部</label>
                            </div>
                            <div class="flex-1">
                                <input type="radio" id="export-puzzle" name="export-scope" value="puzzle" class="hidden export-option" onchange="state.exportScope = 'puzzle'">
                                <label for="export-puzzle" class="block text-center py-2 text-[10px] font-bold rounded-lg border border-slate-200 cursor-pointer text-slate-500 transition-all">僅拼圖</label>
                            </div>
                            <div class="flex-1">
                                <input type="radio" id="export-map" name="export-scope" value="map" class="hidden export-option" onchange="state.exportScope = 'map'">
                                <label for="export-map" class="block text-center py-2 text-[10px] font-bold rounded-lg border border-slate-200 cursor-pointer text-slate-500 transition-all">僅底圖</label>
                            </div>
                        </div>
                    </div>

                    <button onclick="exportPDF()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                        下載 PDF 檔案
                    </button>
                </section>

                <!-- 頁尾 -->
                <footer class="pt-4 border-t border-slate-200 text-center">
                    <p class="text-slate-400 text-sm">設計：<a href="https://www.facebook.com/mpotkevin" target="_blank" class="text-blue-600 font-bold hover:underline">職能治療師 - 鄭凱文</a></p>
                </footer>
            </div>

        </aside>

        <!-- 右側預覽區 (手機端在下方) -->
        <div id="preview-container" class="flex-1 relative flex flex-col items-center justify-start overflow-visible md:overflow-auto bg-slate-50">
            
            <!-- 預覽切換 Tab (手機端 sticky 置頂) -->
            <div id="preview-tabs-container" class="hidden sticky top-0 w-full z-40 flex justify-center py-4 bg-slate-50/95 backdrop-blur border-b border-slate-200 px-4">
                <div class="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200 w-full max-w-sm">
                    <button onclick="updatePreviewPage(1)" id="tab-1" class="flex-1 py-2 rounded-lg text-xs sm:text-sm font-bold transition-all bg-blue-600 text-white shadow-sm">頁 1：拼圖預覽</button>
                    <button onclick="updatePreviewPage(2)" id="tab-2" class="flex-1 py-2 rounded-lg text-xs sm:text-sm font-bold transition-all text-slate-500 hover:text-slate-700">頁 2：輔助底圖</button>
                </div>
            </div>

            <!-- 未上傳時的狀態 -->
            <div id="empty-state" class="flex-1 min-h-[300px] flex flex-col items-center justify-center text-center max-w-sm px-6 py-12">
                <div class="w-16 h-16 bg-slate-200 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <h3 class="text-base font-bold text-slate-800 mb-2">等待圖片上傳...</h3>
                <p class="text-xs text-slate-500 leading-relaxed">請從上方上傳照片以預覽拼圖。</p>
            </div>

            <!-- 預覽畫布容器 -->
            <div id="canvas-wrapper" class="hidden p-4 md:p-12 flex flex-col items-center w-full">
                <div class="w-full flex justify-center">
                    <canvas id="preview-canvas" class="transition-opacity duration-300"></canvas>
                </div>
                
                <!-- 底部資訊列 -->
                <div id="canvas-info" class="mt-6 bg-slate-800/90 backdrop-blur px-5 py-2 rounded-full text-[10px] text-white/80 font-mono tracking-widest uppercase flex items-center gap-4 shadow-xl">
                    <span id="info-res">0 x 0 PX</span>
                    <span class="w-px h-3 bg-white/20"></span>
                    <span id="info-mode">GRID</span>
                </div>
            </div>
        </div>

    </main>

    <script>
        const { jsPDF } = window.jspdf;
        
        let state = {
            mode: 'grid', 
            cols: 4,
            rows: 4,
            thickness: 5,
            lineColor: '#000000',
            image: null,
            seed: Math.random(),
            previewPage: 1,
            exportScope: 'both',
            rotation: 0,
            pdfOrientation: 'p'
        };

        const canvas = document.getElementById('preview-canvas');
        const ctx = canvas.getContext('2d');
        const dropZone = document.getElementById('drop-zone');
        const emptyState = document.getElementById('empty-state');
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const previewTabs = document.getElementById('preview-tabs-container');

        function updateState(updates) {
            Object.assign(state, updates);
            
            document.getElementById('label-cols').innerText = state.cols;
            document.getElementById('label-rows').innerText = state.rows;
            document.getElementById('label-thickness').innerText = state.thickness + 'px';
            document.getElementById('input-color').value = state.lineColor;
            
            const isGrid = state.mode === 'grid';
            document.getElementById('btn-grid').className = isGrid 
                ? "flex-1 py-1.5 text-xs rounded bg-white shadow-sm font-bold text-blue-600 transition-all" 
                : "flex-1 py-1.5 text-xs rounded text-slate-500 hover:bg-white/50 font-medium transition-all";
            document.getElementById('btn-slant').className = !isGrid 
                ? "flex-1 py-1.5 text-xs rounded bg-white shadow-sm font-bold text-blue-600 transition-all" 
                : "flex-1 py-1.5 text-xs rounded text-slate-500 hover:bg-white/50 font-medium transition-all";

            const isPort = state.pdfOrientation === 'p';
            document.getElementById('btn-port').className = isPort 
                ? "flex-1 py-1.5 text-[10px] rounded bg-white shadow-sm font-bold text-blue-600" 
                : "flex-1 py-1.5 text-[10px] rounded text-slate-500 hover:bg-white/50 font-medium";
            document.getElementById('btn-land').className = !isPort 
                ? "flex-1 py-1.5 text-[10px] rounded bg-white shadow-sm font-bold text-blue-600" 
                : "flex-1 py-1.5 text-[10px] rounded text-slate-500 hover:bg-white/50 font-medium";

            document.getElementById('info-mode').innerText = state.mode.toUpperCase();
            draw();
        }

        function rotateImage() {
            state.rotation = (state.rotation + 90) % 360;
            draw();
        }

        function updatePreviewPage(page) {
            state.previewPage = page;
            const t1 = document.getElementById('tab-1');
            const t2 = document.getElementById('tab-2');
            
            if(page === 1) {
                t1.className = "flex-1 py-2 rounded-lg text-xs sm:text-sm font-bold transition-all bg-blue-600 text-white shadow-sm";
                t2.className = "flex-1 py-2 rounded-lg text-xs sm:text-sm font-bold transition-all text-slate-500 hover:text-slate-700";
            } else {
                t2.className = "flex-1 py-2 rounded-lg text-xs sm:text-sm font-bold transition-all bg-blue-600 text-white shadow-sm";
                t1.className = "flex-1 py-2 rounded-lg text-xs sm:text-sm font-bold transition-all text-slate-500 hover:text-slate-700";
            }
            draw();
        }

        dropZone.onclick = () => document.getElementById('img-input').click();
        
        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    state.image = img;
                    state.seed = Math.random();
                    state.rotation = 0;
                    document.getElementById('section-2').classList.remove('disabled');
                    document.getElementById('section-3').classList.remove('disabled');
                    emptyState.classList.add('hidden');
                    canvasWrapper.classList.remove('hidden');
                    previewTabs.classList.remove('hidden');
                    document.getElementById('upload-placeholder').classList.add('hidden');
                    const fileInfo = document.getElementById('file-info');
                    fileInfo.innerText = file.name;
                    fileInfo.classList.remove('hidden');
                    updateState({});
                    
                    // 手機端自動滾動到預覽區
                    if (window.innerWidth < 768) {
                        setTimeout(() => {
                            canvasWrapper.scrollIntoView({ behavior: 'smooth' });
                        }, 300);
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function drawLines(targetCtx, w, h, forceColor = null, forceThickness = null) {
            targetCtx.strokeStyle = forceColor || state.lineColor;
            targetCtx.lineWidth = forceThickness || state.thickness;
            targetCtx.lineCap = "round";
            targetCtx.lineJoin = "round";

            const cols = parseInt(state.cols);
            const rows = parseInt(state.rows);
            
            const getOffset = (seed, i, j) => {
                const x = Math.sin(seed + i * 137.5 + j * 42.1) * 10000;
                return (x - Math.floor(x)) - 0.5;
            };

            const wobble = 0.4;

            if (state.mode === 'grid') {
                for (let i = 1; i < rows; i++) {
                    const y = (h / rows) * i;
                    targetCtx.beginPath(); targetCtx.moveTo(0, y); targetCtx.lineTo(w, y); targetCtx.stroke();
                }
                for (let i = 1; i < cols; i++) {
                    const x = (w / cols) * i;
                    targetCtx.beginPath(); targetCtx.moveTo(x, 0); targetCtx.lineTo(x, h); targetCtx.stroke();
                }
            } else {
                const points = [];
                for (let j = 0; j <= rows; j++) {
                    points[j] = [];
                    for (let i = 0; i <= cols; i++) {
                        let px = (w / cols) * i;
                        let py = (h / rows) * j;
                        if (i > 0 && i < cols) px += getOffset(state.seed, i, j) * (w / cols) * wobble;
                        if (j > 0 && j < rows) py += getOffset(state.seed + 1, i, j) * (h / rows) * wobble;
                        points[j][i] = { x: px, y: py };
                    }
                }

                for (let j = 1; j < rows; j++) {
                    targetCtx.beginPath();
                    targetCtx.moveTo(points[j][0].x, points[j][0].y);
                    for (let i = 1; i <= cols; i++) targetCtx.lineTo(points[j][i].x, points[j][i].y);
                    targetCtx.stroke();
                }
                for (let i = 1; i < cols; i++) {
                    targetCtx.beginPath();
                    targetCtx.moveTo(points[0][i].x, points[0][i].y);
                    for (let j = 1; j <= rows; j++) targetCtx.lineTo(points[j][i].x, points[j][i].y);
                    targetCtx.stroke();
                }
            }
        }

        function draw() {
            if (!state.image) return;
            const img = state.image;
            
            const isVerticalRotation = state.rotation === 90 || state.rotation === 270;
            const targetW = isVerticalRotation ? img.height : img.width;
            const targetH = isVerticalRotation ? img.width : img.height;
            
            canvas.width = targetW;
            canvas.height = targetH;
            
            document.getElementById('info-res').innerText = `${targetW} x ${targetH} PX`;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (state.previewPage === 1) {
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate((state.rotation * Math.PI) / 180);
                ctx.drawImage(img, -img.width / 2, -img.height / 2);
                ctx.restore();
                drawLines(ctx, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                drawLines(ctx, canvas.width, canvas.height, "#cccccc");
                ctx.strokeStyle = "#000000";
                ctx.lineWidth = Math.max(state.thickness, 2.5); 
                ctx.strokeRect(0, 0, canvas.width, canvas.height);
            }
        }

        async function exportPDF() {
            if (!state.image) return;
            
            const pdf = new jsPDF({ 
                orientation: state.pdfOrientation, 
                unit: 'mm', 
                format: 'a4' 
            });

            const isLand = state.pdfOrientation === 'l';
            const pageWidth = isLand ? 297 : 210;
            const pageHeight = isLand ? 210 : 297;
            const margin = 12;
            const contentWidth = pageWidth - (margin * 2);
            const contentHeight = pageHeight - (margin * 2);
            
            const isVerticalRotation = state.rotation === 90 || state.rotation === 270;
            const currentW = isVerticalRotation ? state.image.height : state.image.width;
            const currentH = isVerticalRotation ? state.image.width : state.image.height;
            
            const ratio = currentW / currentH;
            let drawW, drawH;

            if (ratio > contentWidth / contentHeight) {
                drawW = contentWidth;
                drawH = contentWidth / ratio;
            } else {
                drawH = contentHeight;
                drawW = drawH * ratio;
            }

            const x = (pageWidth - drawW) / 2;
            const y = (pageHeight - drawH) / 2;

            const renderPageToImg = (type) => {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = currentW;
                tempCanvas.height = currentH;
                const tCtx = tempCanvas.getContext('2d');
                
                if(type === 1) {
                    tCtx.save();
                    tCtx.translate(currentW / 2, currentH / 2);
                    tCtx.rotate((state.rotation * Math.PI) / 180);
                    tCtx.drawImage(state.image, -state.image.width / 2, -state.image.height / 2);
                    tCtx.restore();
                    drawLines(tCtx, currentW, currentH);
                } else {
                    tCtx.fillStyle = "#ffffff";
                    tCtx.fillRect(0, 0, currentW, currentH);
                    drawLines(tCtx, currentW, currentH, "#cccccc");
                    tCtx.strokeStyle = "#000000";
                    tCtx.lineWidth = Math.max(state.thickness, 2.5);
                    tCtx.strokeRect(0, 0, currentW, currentH);
                }
                return tempCanvas.toDataURL('image/jpeg', 0.95);
            };

            const addPuzzlePage = () => {
                pdf.addImage(renderPageToImg(1), 'JPEG', x, y, drawW, drawH);
                pdf.setFontSize(8);
                pdf.setTextColor(180);
                pdf.text("PAGE 1: PUZZLE", pageWidth/2, pageHeight - 8, {align:'center'});
            };

            const addMapPage = () => {
                pdf.addImage(renderPageToImg(2), 'JPEG', x, y, drawW, drawH);
                pdf.setFontSize(8);
                pdf.setTextColor(180);
                pdf.text("PAGE 2: GUIDANCE MAP", pageWidth/2, pageHeight - 8, {align:'center'});
            };

            if (state.exportScope === 'both') {
                addPuzzlePage();
                pdf.addPage();
                addMapPage();
            } else if (state.exportScope === 'puzzle') {
                addPuzzlePage();
            } else {
                addMapPage();
            }

            pdf.save(`puzzle-maker-${Date.now()}.pdf`);
        }

        // 拖放支援
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('border-blue-500', 'bg-blue-50'); };
        dropZone.ondragleave = () => { dropZone.classList.remove('border-blue-500', 'bg-blue-50'); };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
            handleFile(e.dataTransfer.files[0]);
        };
    </script>
</body>
</html>
