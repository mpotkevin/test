<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>氣球心算注意力挑戰 V15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
            height: 100vh;
            margin: 0;
            user-select: none;
            touch-action: none;
        }

        /* 氣球容器 - 顯著加大尺寸 */
        .balloon-wrapper {
            position: absolute;
            bottom: -200px;
            z-index: 10;
            animation: rise linear forwards;
        }

        .wobble-layer {
            animation: wobble 3s ease-in-out infinite;
        }

        /* 氣球樣式優化 - 適合長輩觀看 */
        .balloon {
            width: 100px;
            height: 130px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 2rem; /* 數字極大化 */
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3), -1px -1px 0px rgba(0,0,0,0.3), 1px -1px 0px rgba(0,0,0,0.3), -1px 1px 0px rgba(0,0,0,0.3);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.15), 5px 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            position: relative;
            border: 2px solid rgba(255,255,255,0.2);
        }

        @media (min-width: 768px) {
            .balloon { width: 120px; height: 160px; font-size: 2.5rem; }
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 50px;
            background: rgba(0,0,0,0.2);
        }

        .balloon-blue { background-color: #2563EB; }
        .balloon-red { background-color: #DC2626; }
        .balloon-yellow { background-color: #F59E0B; color: #451a03; text-shadow: none !important; }

        @keyframes rise {
            from { bottom: -200px; }
            to { bottom: 120vh; }
        }

        @keyframes wobble {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(30px); }
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .paused .balloon-wrapper,
        .paused .wobble-layer {
            animation-play-state: paused !important;
        }
        
        .paused .balloon { pointer-events: none; }

        .popped {
            animation: pop 0.2s ease-out forwards !important;
            pointer-events: none;
        }

        /* UI 層級強化 */
        #game-ui {
            z-index: 9999; /* 確保在最頂層 */
            background: rgba(0, 0, 0, 0.05); /* 輕微背景色提升辨識度 */
        }
        #countdown-overlay {
            z-index: 1000;
        }

        .modal-bg {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
        }
    </style>
</head>
<body>

    <div id="app-root" class="relative w-full h-full">
        
        <!-- 主選單畫面 -->
        <div id="menu-screen" class="absolute inset-0 flex items-center justify-center z-[10000] p-4 bg-sky-50">
            <div class="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center border-4 border-white flex flex-col max-h-full overflow-y-auto">
                <h1 class="text-3xl md:text-4xl font-bold text-blue-600 mb-2">氣球心算注意力挑戰</h1>
                <p id="lib-count-text" class="text-sm text-gray-500 mb-8 font-bold">目前題庫：132 個國字</p>
                
                <div class="space-y-6 text-left mb-8">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-400">關卡時間 (秒)</label>
                            <input type="number" id="input-game-time" value="30" class="w-full border-2 border-gray-100 rounded-2xl p-3 mt-1 outline-none focus:border-blue-400 text-lg font-bold">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-400">氣球總數</label>
                            <input type="number" id="input-total-balloons" value="15" class="w-full border-2 border-gray-100 rounded-2xl p-3 mt-1 outline-none focus:border-blue-400 text-lg font-bold">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-400">飄浮速度: <span id="display-speed" class="text-blue-500">8</span>秒</label>
                        <input type="range" id="input-speed-range" min="2" max="15" step="1" value="8" class="w-full h-3 bg-blue-100 rounded-lg appearance-none mt-2">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-400">數字範圍 (1 ~ X)</label>
                        <input type="number" id="input-max-num" value="10" min="1" class="w-full border-2 border-gray-100 rounded-2xl p-3 mt-1 outline-none focus:border-blue-400 text-lg font-bold">
                    </div>

                    <div class="p-4 bg-orange-50 rounded-3xl border-2 border-orange-100">
                        <label class="flex items-center space-x-3 cursor-pointer">
                            <input type="checkbox" id="input-advanced-mode" class="w-6 h-6 text-orange-500 rounded-lg">
                            <span class="text-lg font-bold text-orange-600">進階模式 (記憶國字氣球)</span>
                        </label>
                        <div id="setting-word-count" class="hidden flex items-center justify-between mt-4 pl-9">
                            <div class="flex items-center space-x-2">
                                <span class="font-bold text-gray-600">字數:</span>
                                <input type="number" id="input-target-word-count" value="3" class="w-16 border-2 border-orange-200 rounded-xl p-1 text-center font-bold">
                            </div>
                            <button id="btn-open-lib" class="bg-orange-200 text-orange-700 px-4 py-2 rounded-xl font-bold text-sm">編輯題庫</button>
                        </div>
                    </div>
                </div>

                <button id="btn-start" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-5 rounded-[2rem] shadow-xl transition active:scale-95 text-2xl mb-6">
                    開始挑戰
                </button>
                
                <div class="pt-6 border-t border-gray-100">
                    <a href="https://www.facebook.com/mpotkevin" target="_blank" class="text-sm text-blue-400 font-bold flex items-center justify-center hover:underline">
                        設計：職能治療師 - 鄭凱文
                    </a>
                </div>
            </div>
        </div>

        <!-- 題庫管理 -->
        <div id="lib-screen" class="hidden absolute inset-0 flex items-center justify-center z-[10001] modal-bg p-4">
            <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-lg flex flex-col max-h-[90vh] border-2 border-gray-50">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-gray-800">國字題庫管理</h2>
                    <button id="btn-close-lib" class="text-gray-400 text-4xl leading-none">&times;</button>
                </div>
                <div class="flex space-x-3 mb-6">
                    <input type="text" id="input-new-word" maxlength="1" placeholder="輸入字" class="flex-grow border-2 border-gray-100 rounded-2xl p-3 text-center text-xl font-bold">
                    <button id="btn-add-word" class="bg-orange-500 text-white px-8 py-3 rounded-2xl font-bold">新增</button>
                </div>
                <div id="word-list" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3 overflow-y-auto p-4 bg-gray-50 rounded-3xl flex-grow shadow-inner"></div>
            </div>
        </div>

        <!-- 遊戲畫布 -->
        <div id="game-canvas" class="w-full h-full relative overflow-hidden"></div>

        <!-- 操作 UI - 平板優化版 -->
        <div id="game-ui" class="hidden absolute top-0 left-0 w-full p-6 flex justify-between items-start pointer-events-none">
            <div class="space-y-3 pointer-events-auto">
                <div id="timer-ui" class="bg-white/95 px-5 py-3 rounded-2xl font-bold text-blue-700 shadow-xl border-2 border-blue-200 text-lg">時間: --s</div>
                <div id="progress-ui" class="bg-white/95 px-5 py-3 rounded-2xl font-bold text-purple-700 shadow-xl border-2 border-purple-200 text-lg">進度: 0 / 0</div>
            </div>
            <div class="flex space-x-4 pointer-events-auto">
                <button id="btn-pause" class="bg-yellow-500 text-white px-8 py-4 rounded-2xl font-bold shadow-2xl text-lg active:scale-90 transition-transform border-b-4 border-yellow-700">暫停</button>
                <button id="btn-stop" class="bg-red-500 text-white px-8 py-4 rounded-2xl font-bold shadow-2xl text-lg active:scale-90 transition-transform border-b-4 border-red-700">結束</button>
            </div>
        </div>

        <div id="countdown-overlay" class="hidden absolute inset-0 flex items-center justify-center text-[15rem] font-bold text-blue-600 drop-shadow-2xl pointer-events-none"></div>

        <!-- 結算畫面 -->
        <div id="result-screen" class="hidden absolute inset-0 flex items-center justify-center z-[5000] modal-bg p-4">
            <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center border-4 border-blue-50">
                <h2 class="text-3xl font-bold mb-8 text-gray-800">挑戰結束！請填寫</h2>
                <div class="space-y-6 text-left">
                    <div>
                        <label class="block text-lg font-bold text-gray-500 mb-2">數字總和</label>
                        <input type="number" id="ans-sum" placeholder="請填寫數字" class="w-full border-2 border-blue-100 rounded-2xl p-5 text-3xl font-bold text-center outline-none focus:border-blue-500">
                    </div>
                    <div id="ans-words-container" class="hidden">
                        <label class="block text-lg font-bold text-gray-500 mb-2">國字順序</label>
                        <input type="text" id="ans-words" placeholder="請依序填寫" class="w-full border-2 border-orange-100 rounded-2xl p-5 text-3xl font-bold text-center outline-none focus:border-orange-500">
                    </div>
                </div>
                <button id="btn-verify" class="w-full mt-10 bg-green-500 hover:bg-green-600 text-white font-bold py-5 rounded-[2rem] shadow-xl text-2xl transition active:scale-95">提交答案</button>
            </div>
        </div>

        <!-- 結果反饋 -->
        <div id="feedback-screen" class="hidden absolute inset-0 flex items-center justify-center z-[6000] modal-bg p-4">
            <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center border-4 border-gray-50">
                <div id="res-icon" class="text-[8rem] mb-6">🎉</div>
                <h2 id="res-title" class="font-bold text-3xl mb-6">挑戰結果</h2>
                <div id="res-body" class="text-left bg-gray-50 p-6 rounded-3xl mb-8 space-y-4 border-2 border-gray-100 text-xl"></div>
                <button id="btn-restart" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-5 rounded-[2rem] shadow-xl text-2xl">返回主選單</button>
            </div>
        </div>
    </div>

    <script>
        // --- 題庫與狀態 ---
        let chineseLibrary = ["天", "地", "人", "水", "火", "木", "金", "山", "海", "雲", "風", "月", "日", "光", "星", "花", "鳥", "石", "川", "龍", "虎", "雨", "電", "心", "夢", "森", "林", "湖", "泉", "冰", "雪", "霧", "露", "霜", "霄", "霆", "震", "虹", "霓", "霞", "魚", "蝦", "蟹", "蛇", "鹿", "象", "馬", "牛", "羊", "雞", "犬", "豕", "貓", "鼠", "兔", "東", "西", "南", "北", "上", "下", "左", "右", "中", "紅", "橙", "黃", "綠", "藍", "靛", "紫", "黑", "白", "青", "灰", "褐", "仁", "義", "禮", "智", "信", "忠", "孝", "愛", "和", "平", "誠", "勇", "春", "夏", "秋", "冬", "晨", "昏", "晝", "夜", "銀", "銅", "鐵", "錫", "珠", "寶", "玉", "翠", "大", "小", "長", "短", "高", "低", "寬", "窄", "文", "武", "詩", "書", "琴", "棋", "畫", "劍", "盾", "神", "仙", "鬼", "佛", "聖", "賢", "酒", "茶", "飯", "菜"];

        const UI = {
            menu: document.getElementById('menu-screen'),
            libScreen: document.getElementById('lib-screen'),
            canvas: document.getElementById('game-canvas'),
            uiLayer: document.getElementById('game-ui'),
            countdown: document.getElementById('countdown-overlay'),
            result: document.getElementById('result-screen'),
            feedback: document.getElementById('feedback-screen'),
            ansWordsCont: document.getElementById('ans-words-container'),
            timer: document.getElementById('timer-ui'),
            progress: document.getElementById('progress-ui'),
            speedLabel: document.getElementById('display-speed'),
            wordList: document.getElementById('word-list'),
            libCountText: document.getElementById('lib-count-text'),
            pauseBtn: document.getElementById('btn-pause'),
            stopBtn: document.getElementById('btn-stop'),
            startBtn: document.getElementById('btn-start'),
            verifyBtn: document.getElementById('btn-verify'),
            restartBtn: document.getElementById('btn-restart'),
            openLibBtn: document.getElementById('btn-open-lib'),
            closeLibBtn: document.getElementById('btn-close-lib'),
            addWordBtn: document.getElementById('btn-add-word'),
            newWordInput: document.getElementById('input-new-word')
        };

        const INPUTS = {
            gameTime: document.getElementById('input-game-time'),
            totalBalloons: document.getElementById('input-total-balloons'),
            speed: document.getElementById('input-speed-range'),
            maxNum: document.getElementById('input-max-num'),
            advanced: document.getElementById('input-advanced-mode'),
            wordCount: document.getElementById('input-target-word-count'),
            ansSum: document.getElementById('ans-sum'),
            ansWords: document.getElementById('ans-words')
        };

        let state = {
            gameActive: false, isPaused: false, timeLeft: 0,
            actualSum: 0, actualWords: [], spawnedCount: 0,
            totalToSpawn: 0, targetWords: 0, currentWordsCount: 0,
            timerIds: [], intervalIds: []
        };

        // --- 題庫管理 ---
        function renderWordList() {
            UI.wordList.innerHTML = '';
            chineseLibrary.forEach((word, index) => {
                const div = document.createElement('div');
                div.className = 'relative bg-white border-2 border-gray-100 rounded-xl p-2 text-center font-bold h-12 flex items-center justify-center text-xl shadow-sm';
                div.innerText = word;
                const delBtn = document.createElement('button');
                delBtn.className = 'absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold shadow-md';
                delBtn.innerText = '✕';
                delBtn.onclick = (e) => { e.stopPropagation(); chineseLibrary.splice(index, 1); renderWordList(); updateLibInfo(); };
                div.appendChild(delBtn);
                UI.wordList.appendChild(div);
            });
        }
        function updateLibInfo() { UI.libCountText.innerText = `目前題庫：${chineseLibrary.length} 個國字`; }
        UI.openLibBtn.onclick = () => { renderWordList(); UI.libScreen.classList.remove('hidden'); };
        UI.closeLibBtn.onclick = () => UI.libScreen.classList.add('hidden');
        UI.addWordBtn.onclick = () => {
            const word = UI.newWordInput.value.trim();
            if (word && word.length === 1 && !chineseLibrary.includes(word)) {
                chineseLibrary.unshift(word); UI.newWordInput.value = ''; renderWordList(); updateLibInfo();
            }
        };

        // --- 核心邏輯 ---
        INPUTS.speed.oninput = (e) => UI.speedLabel.innerText = e.target.value;
        INPUTS.advanced.onchange = (e) => document.getElementById('setting-word-count').classList.toggle('hidden', !e.target.checked);

        function clearAll() {
            state.timerIds.forEach(id => clearTimeout(id));
            state.intervalIds.forEach(id => clearInterval(id));
            state.timerIds = []; state.intervalIds = [];
        }
        function trackT(fn, d) { state.timerIds.push(setTimeout(fn, d)); }
        function trackI(fn, d) { state.intervalIds.push(setInterval(fn, d)); }

        UI.startBtn.onclick = () => { UI.menu.classList.add('hidden'); countdown(); };

        function countdown() {
            UI.countdown.classList.remove('hidden');
            let c = 3; UI.countdown.innerText = c;
            const itv = setInterval(() => {
                c--;
                if (c > 0) UI.countdown.innerText = c;
                else { clearInterval(itv); UI.countdown.classList.add('hidden'); if (!state.gameActive) start(); }
            }, 1000);
        }

        function start() {
            state.gameActive = true; state.isPaused = false;
            state.actualSum = 0; state.actualWords = []; state.spawnedCount = 0; state.currentWordsCount = 0;
            state.totalToSpawn = parseInt(INPUTS.totalBalloons.value) || 15;
            state.timeLeft = parseInt(INPUTS.gameTime.value) || 30;
            state.targetWords = INPUTS.advanced.checked ? (parseInt(INPUTS.wordCount.value) || 3) : 0;
            
            UI.canvas.innerHTML = ''; UI.uiLayer.classList.remove('hidden'); updateUI();
            trackI(() => { if (!state.isPaused && state.gameActive) { state.timeLeft--; updateUI(); if (state.timeLeft <= 0) stopSpawning(); } }, 1000);
            const interval = (state.timeLeft * 0.9 * 1000) / state.totalToSpawn;
            loop(interval);
        }

        function loop(iv) {
            if (!state.gameActive || state.spawnedCount >= state.totalToSpawn) return;
            trackT(() => {
                if (!state.isPaused && state.gameActive && state.spawnedCount < state.totalToSpawn) spawn();
                if (state.gameActive && state.spawnedCount < state.totalToSpawn) loop(iv);
            }, iv);
        }

        function stopSpawning() {
            // 時間到，不再產生氣球，但必須等待畫面上氣球飄完
            state.spawnedCount = state.totalToSpawn;
        }

        function spawn() {
            state.spawnedCount++; updateUI();
            const wrap = document.createElement('div'); wrap.className = 'balloon-wrapper';
            const wobble = document.createElement('div'); wobble.className = 'wobble-layer';
            const b = document.createElement('div');
            let t = Math.random() > 0.5 ? 'blue' : 'red';
            
            const maxVal = INPUTS.maxNum ? (parseInt(INPUTS.maxNum.value) || 10) : 10;
            const v = Math.floor(Math.random() * maxVal) + 1;

            if (INPUTS.advanced.checked && state.currentWordsCount < state.targetWords) {
                if (Math.random() < (state.targetWords - state.currentWordsCount) / (state.totalToSpawn - state.spawnedCount + 1)) t = 'yellow';
            }
            b.className = `balloon balloon-${t}`;
            if (t === 'blue') { b.innerText = `+${v}`; state.actualSum += v; }
            else if (t === 'red') { b.innerText = `-${v}`; state.actualSum -= v; }
            else { 
                const w = chineseLibrary.length > 0 ? chineseLibrary[Math.floor(Math.random() * chineseLibrary.length)] : "A";
                b.innerText = w; state.actualWords.push(w); state.currentWordsCount++; 
            }
            b.onclick = () => { if (!state.isPaused && state.gameActive) { b.classList.add('popped'); setTimeout(() => { if (wrap.parentNode) UI.canvas.removeChild(wrap); checkEnd(); }, 200); } };
            wrap.style.left = (Math.random() * (window.innerWidth - 120) + 20) + 'px';
            wrap.style.animationDuration = INPUTS.speed.value + 's';
            wobble.style.animationDuration = (Math.random() * 2 + 2) + 's';
            wobble.appendChild(b); wrap.appendChild(wobble); UI.canvas.appendChild(wrap);
            wrap.onanimationend = () => { if (wrap.parentNode) UI.canvas.removeChild(wrap); checkEnd(); };
        }

        function checkEnd() { 
            // 關鍵：只有當總數達標，且畫面上沒有任何氣球時才結束
            if (state.spawnedCount >= state.totalToSpawn && UI.canvas.childElementCount === 0) {
                finish();
            }
        }

        function updateUI() { UI.timer.innerText = `時間: ${state.timeLeft}s`; UI.progress.innerText = `進度: ${state.spawnedCount} / ${state.totalToSpawn}`; }
        UI.stopBtn.onclick = () => reset();
        function reset() { state.gameActive = false; clearAll(); UI.canvas.innerHTML = ''; UI.uiLayer.classList.add('hidden'); UI.result.classList.add('hidden'); UI.feedback.classList.add('hidden'); UI.menu.classList.remove('hidden'); UI.pauseBtn.innerText = "暫停"; }
        function finish() { state.gameActive = false; clearAll(); UI.uiLayer.classList.add('hidden'); UI.canvas.innerHTML = ''; INPUTS.ansSum.value = ''; INPUTS.ansWords.value = ''; UI.result.classList.remove('hidden'); UI.ansWordsCont.classList.toggle('hidden', !INPUTS.advanced.checked); }

        UI.pauseBtn.onclick = function() {
            if (!state.gameActive) return;
            state.isPaused = !state.isPaused;
            UI.canvas.classList.toggle('paused', state.isPaused);
            this.innerText = state.isPaused ? "繼續" : "暫停";
        };

        UI.verifyBtn.onclick = () => {
            const uS = parseInt(INPUTS.ansSum.value); const uW = INPUTS.ansWords.value.trim();
            const sO = uS === state.actualSum; const wO = !INPUTS.advanced.checked || (uW === state.actualWords.join(''));
            UI.result.classList.add('hidden'); UI.feedback.classList.remove('hidden');
            document.getElementById('res-icon').innerText = (sO && wO) ? "🏆" : (sO || wO ? "🥈" : "😅");
            document.getElementById('res-title').innerText = (sO && wO) ? "完美的表現！" : (sO || wO ? "很接近了！" : "再接再厲！");
            document.getElementById('res-body').innerHTML = `<div class="flex justify-between items-center"><span class="text-gray-500">正確總和:</span><span class="font-bold text-2xl ${sO?'text-green-600':'text-red-600'}">${state.actualSum}</span></div>${INPUTS.advanced.checked?`<hr class="my-4"><div class="text-lg">正確國字: <span class="font-bold text-blue-600 tracking-widest ml-2">${state.actualWords.join('')}</span></div>`:''}`;
        };
        UI.restartBtn.onclick = () => { UI.feedback.classList.add('hidden'); UI.menu.classList.remove('hidden'); };
    </script>
</body>
</html>
