            { category: "字謎", question: "守株待兔（猜一字）。", answer: "柳" },
            { category: "地名", question: "忠孝仁愛信義和平（猜一地名）。", answer: "八德" },
            { category: "食物", question: "青皮包白瓤，外型像條槓（猜食物）。", answer: "絲瓜" },
            { category: "地名", question: "東西賣光光（猜一地名）。", answer: "通宵" },
            { category: "物品", question: "遠看像面鼓，近看像面鑼（猜物品）。", answer: "碗" },
            { category: "成語", question: "螃蟹走路（猜一成語）。", answer: "橫行霸道" }
        ].map((r, i) => ({ ...r, id: (i + 1).toString() }));

        const App = () => {
            const [view, setView] = useState('menu'); 
            const [mode, setMode] = useState('single'); 
            const [teamCount, setTeamCount] = useState(2);
            const [currentRiddlePage, setCurrentRiddlePage] = useState(0); 
            const [gameRiddles, setGameRiddles] = useState([]); 
            const [completed, setCompleted] = useState(new Set());
            const [scores, setScores] = useState({});
            const [activeTeamIdx, setActiveTeamIdx] = useState(0);
            const [timer, setTimer] = useState(0);
            const [selectedRiddle, setSelectedRiddle] = useState(null);
            const [userInput, setUserInput] = useState('');
            const [feedback, setFeedback] = useState(null); 
            const [hintLevel, setHintLevel] = useState(0);
            const [showFullAnswer, setShowFullAnswer] = useState(false);
            const [riddlePool, setRiddlePool] = useState(RIDDLES_DATA);
            const [selectedPoolIds, setSelectedPoolIds] = useState(new Set(RIDDLES_DATA.map(r => r.id)));
            const [draggedIdx, setDraggedIdx] = useState(null);
            const [newRiddle, setNewRiddle] = useState({ category: '自訂', question: '', answer: '' });

            const sound = useSoundEffect();
            const currentRiddleSubset = gameRiddles.slice(currentRiddlePage * 20, (currentRiddlePage + 1) * 20);
            const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;

            useEffect(() => {
                let interval;
                if (view === 'game') interval = setInterval(() => setTimer(prev => prev + 1), 1000);
                return () => clearInterval(interval);
            }, [view]);

            const handleModeClick = (m) => {
                sound.playClick();
                setMode(m);
                if (m === 'group') setView('teamSelect');
                else startNewGame(m, 1);
            };

            const startNewGame = (m, tc) => {
                const initialScores = {};
                for (let i = 0; i < tc; i++) initialScores[i] = 0;
                setScores(initialScores);
                setTeamCount(tc);
                setCurrentRiddlePage(0);
                setCompleted(new Set());
                setTimer(0);
                setActiveTeamIdx(0);
                setGameRiddles(riddlePool.filter(r => selectedPoolIds.has(r.id)));
                setView('game');
            };

            const handleRiddleClick = (indexInSubset) => {
                const actualIndex = currentRiddlePage * 20 + indexInSubset;
                if (completed.has(actualIndex)) return;
                sound.playClick();
                setSelectedRiddle({ ...gameRiddles[actualIndex], actualIndex });
                setUserInput('');
                setFeedback(null);
                setHintLevel(0);
                setShowFullAnswer(false);
            };

            const checkAnswer = () => {
                if (userInput.trim() === selectedRiddle.answer || showFullAnswer) {
                    setFeedback('correct');
                    sound.playCorrect();
                    setCompleted(prev => {
                        const next = new Set(prev);
                        next.add(selectedRiddle.actualIndex);
                        return next;
                    });
                    setScores(prev => ({ ...prev, [activeTeamIdx]: (prev[activeTeamIdx] || 0) + (showFullAnswer ? 0 : 1) }));
                    setTimeout(() => {
                        setSelectedRiddle(null);
                        if (mode === 'group') setActiveTeamIdx((activeTeamIdx + 1) % teamCount);
                        if (completed.size + 1 === gameRiddles.length) setView('result');
                    }, 1000);
                } else {
                    setFeedback('wrong');
                    sound.playWrong();
                    setTimeout(() => setFeedback(null), 1000);
                }
            };

            const addNewRiddle = () => {
                if (!newRiddle.question || !newRiddle.answer) return;
                sound.playClick();
                const id = Date.now().toString();
                setRiddlePool(prev => [{ ...newRiddle, id }, ...prev]);
                setSelectedPoolIds(prev => new Set(prev).add(id));
                setNewRiddle({ category: '自訂', question: '', answer: '' });
            };

            const handleDragStart = (idx) => setDraggedIdx(idx);
            const handleDrop = (idx) => {
                if (draggedIdx === null || draggedIdx === idx) return;
                const newPool = [...riddlePool];
                const item = newPool[draggedIdx];
                newPool.splice(draggedIdx, 1);
                newPool.splice(idx, 0, item);
                setRiddlePool(newPool);
                setDraggedIdx(null);
                sound.playClick();
            };

            const changePage = (dir) => {
                sound.playClick();
                const totalPages = Math.ceil(gameRiddles.length / 20);
                const next = (currentRiddlePage + dir + totalPages) % totalPages;
                setCurrentRiddlePage(next);
            };

            const Footer = ({ isSmall = false }) => (
                <div className={`w-full text-center ${isSmall ? 'py-1' : 'py-6'} shrink-0 mt-auto z-40 relative`}>
                    <a href="https://www.facebook.com/mpotkevin" target="_blank" rel="noopener noreferrer" className={`${isSmall ? 'text-sm' : 'text-xl'} text-yellow-500/40 hover:text-yellow-400 font-bold transition-all flex items-center justify-center gap-2 group`}>
                        <span>設計：職能治療師 - 鄭凱文</span>
                    </a>
                </div>
            );

            const Lantern = ({ number, category, isDone, onClick }) => (
                <div onClick={onClick} className={`relative cursor-pointer transition-all duration-300 group flex flex-col items-center ${isDone ? 'opacity-50' : 'hover:scale-105 active:scale-95'}`}>
                    <div className={`mb-1 px-5 py-1 rounded-full text-xl font-black border transition-all shadow-sm ${isDone ? 'bg-gray-800 text-gray-400 border-gray-600' : 'bg-yellow-500/20 text-yellow-400 border-yellow-500/50 group-hover:bg-yellow-500 group-hover:text-red-950'}`}>
                        {category}
                    </div>
                    <div className="relative shrink-0">
                        <div className="absolute -top-2 left-1/2 -translate-x-1/2 w-0.5 h-2 bg-yellow-600/50" />
                        <div className={`w-20 h-24 rounded-[2rem] relative flex items-center justify-center border-2 overflow-hidden transition-all shadow-lg ${isDone ? 'bg-gray-800 border-gray-600' : 'bg-gradient-to-b from-red-500 via-red-600 to-red-800 border-yellow-500/40'}`}>
                            {!isDone && <div className="absolute inset-0 lantern-inner-glow" />}
                            {/* 答對後題號變淡但留著 */}
                            <span className={`text-white font-serif font-black transition-all text-4xl drop-shadow-md ${isDone ? 'opacity-20' : ''}`}>
                                {number}
                            </span>
                            <div className="absolute top-0 w-full h-1.5 bg-gradient-to-r from-yellow-800 via-yellow-400 to-yellow-800" />
                            <div className="absolute bottom-0 w-full h-1.5 bg-gradient-to-r from-yellow-800 via-yellow-400 to-yellow-800" />
                        </div>
                        {isDone && (
                            <div className="absolute -top-1 -right-1 z-30">
                                <div className="done-stamp w-8 h-8 rounded-full flex items-center justify-center animate-in zoom-in duration-300">
                                    <Icon name="check" size={18} className="text-yellow-200" />
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="h-screen w-screen bg-red-950 text-yellow-100 selection:bg-yellow-500 selection:text-red-950 relative flex flex-col overflow-hidden bg-wallpaper">
                    
                    {view === 'menu' && (
                        <div className="full-viewport-center space-y-12">
                            <div className="text-center shrink-0">
                                <h1 className="biaukai-title font-black leading-none">元宵猜燈謎</h1>
                                <p className="mt-8 biaukai-subtitle text-2xl md:text-3xl opacity-90 font-normal">舊時燈謎新玩法，健腦暖心慶元宵</p>
                            </div>
                            <div className="flex flex-col items-center gap-6 w-full shrink-0">
                                <button onClick={() => handleModeClick('single')} className="w-full max-w-sm bg-red-700 hover:bg-red-600 py-6 rounded-[2rem] text-3xl font-black border-b-[8px] border-red-950 active:translate-y-1 shadow-2xl flex items-center justify-center gap-4 transition-all">
                                    <Icon name="user" size={32}/> 個人模式挑戰
                                </button>
                                <button onClick={() => handleModeClick('group')} className="w-full max-w-sm bg-yellow-600 hover:bg-yellow-500 text-red-950 py-6 rounded-[2rem] text-3xl font-black border-b-[8px] border-yellow-800 active:translate-y-1 shadow-2xl flex items-center justify-center gap-4 transition-all">
                                    <Icon name="users" size={32}/> 分組趣味競賽
                                </button>
                            </div>
                            <button onClick={() => { sound.playClick(); setView('settings'); }} className="fixed bottom-10 right-10 bg-red-900/90 backdrop-blur-md p-6 rounded-full border-2 border-yellow-600 shadow-2xl hover:scale-110 transition-all text-yellow-500 group z-50">
                                <Icon name="settings" size={40} className="group-hover:rotate-90 duration-700" />
                            </button>
                            <Footer />
                        </div>
                    )}

                    {view === 'teamSelect' && (
                        <div className="full-viewport-center mx-auto px-4 w-full">
                            <h2 className="text-6xl biaukai-subtitle font-black mb-12 text-center text-yellow-50">請選擇競賽組數</h2>
                            <div className="grid grid-cols-3 gap-8 p-4 max-w-3xl w-full">
                                {[2, 3, 4].map(num => (
                                    <button key={num} onClick={() => { sound.playClick(); startNewGame('group', num); }} className="bg-red-800 hover:bg-red-700 border-4 border-yellow-600 rounded-[3rem] py-12 transition-all transform hover:scale-105 flex flex-col items-center shadow-2xl group">
                                        <span className="text-8xl font-black text-yellow-400 group-hover:text-yellow-200 transition-colors">{(num).toString()}</span>
                                        <span className="text-xl font-bold mt-4 opacity-80 uppercase biaukai-subtitle">組隊競賽</span>
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => { sound.playClick(); setView('menu'); }} className="text-yellow-500 hover:text-yellow-300 font-bold text-2xl underline underline-offset-8 mt-12 transition-all biaukai-subtitle">返回主選單</button>
                            <Footer isSmall />
                        </div>
                    )}

                    {view === 'game' && (
                        <div className="h-screen w-screen flex flex-col overflow-hidden">
                            <div className="bg-red-900/95 border-b-2 border-yellow-600/50 p-3 h-16 flex justify-between items-center shrink-0 z-50">
                                <div className="flex items-center gap-4">
                                    <div className="flex items-center gap-2 bg-black/30 px-3 py-1 rounded-full border border-yellow-700 shadow-inner">
                                        <Icon name="timer" size={18} className="text-yellow-400" />
                                        <span className="font-mono text-xl">{formatTime(timer)}</span>
                                    </div>
                                    <div className="flex items-center gap-2 bg-black/30 px-3 py-1 rounded-full border border-yellow-700 shadow-inner">
                                        <Icon name="trophy" size={18} className="text-yellow-400" />
                                        <span className="text-xl font-bold">{completed.size} / {gameRiddles.length}</span>
                                    </div>
                                </div>
                                {mode === 'group' && (
                                    <div className="flex items-center justify-center gap-2 flex-grow max-w-xl px-4">
                                        {[...Array(teamCount)].map((_, i) => (
                                            <button key={i} onClick={() => { sound.playClick(); setActiveTeamIdx(i); }} className={`flex-1 min-w-0 max-w-[120px] px-2 py-1 rounded-xl border-2 transition-all flex flex-col items-center group relative ${activeTeamIdx === i ? 'bg-yellow-600 text-red-950 border-yellow-300 shadow-[0_0_20px_rgba(234,179,8,0.5)] scale-105' : 'bg-red-800 border-red-700 text-yellow-600 hover:border-red-900'}`}>
                                                <span className="text-[10px] font-black opacity-80 uppercase">Team {i + 1}</span>
                                                <span className="text-xl font-black">{(scores[i] || 0).toString()}</span>
                                            </button>
                                        ))}
                                    </div>
                                )}
                                <button onClick={() => { sound.playClick(); setView('menu'); }} className="p-2 hover:bg-white/10 rounded-full text-yellow-500 transition-all z-50"><Icon name="refresh" size={28} /></button>
                            </div>

                            <div className="flex-1 flex flex-col items-center justify-center p-4 min-h-0 relative">
                                <div className="flex items-center justify-center gap-10 mb-4 shrink-0 mt-2 z-40">
                                    <button onClick={() => { const total = Math.ceil(gameRiddles.length / 20); setCurrentRiddlePage(prev => (prev - 1 + total) % total); sound.playClick(); }} className="p-2 rounded-full border-2 border-yellow-600/30 transition-all hover:bg-yellow-600/10 bg-red-900/50 shadow-md">
                                        <Icon name="arrowLeft" size={32} className="text-yellow-500" />
                                    </button>
                                    <span className="bg-red-900/95 px-8 py-2 rounded-full border-2 border-yellow-600 text-yellow-400 font-black text-xl shadow-xl biaukai-subtitle">
                                        挑戰：第 {(currentRiddlePage * 20 + 1).toString()} - {(currentRiddlePage * 20 + Math.min(20, gameRiddles.length - currentRiddlePage * 20)).toString()} 題
                                    </span>
                                    <button onClick={() => { const total = Math.ceil(gameRiddles.length / 20); setCurrentRiddlePage(prev => (prev + 1) % total); sound.playClick(); }} className="p-2 rounded-full border-2 border-yellow-600/30 transition-all hover:bg-yellow-600/10 bg-red-900/50 shadow-md">
                                        <Icon name="arrowRight" size={32} className="text-yellow-500" />
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto custom-scrollbar p-6 bg-red-900/30 rounded-[3rem] border-2 border-yellow-600/10 w-full max-w-6xl shadow-inner min-h-0">
                                    <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-x-8 gap-y-12 justify-items-center py-4">
                                        {currentRiddleSubset.map((r, i) => (
                                            <Lantern key={r.id} number={currentRiddlePage * 20 + i + 1} category={r.category} isDone={completed.has(currentRiddlePage * 20 + i)} onClick={() => handleRiddleClick(i)} />
                                        ))}
                                    </div>
                                </div>
                                <Footer isSmall />
                            </div>
                        </div>
                    )}

                    {view === 'settings' && (
                        <div className="h-screen w-screen flex flex-col bg-red-950 animate-in fade-in duration-300 overflow-hidden text-white">
                            <div className="p-6 border-b-2 border-yellow-600/30 flex justify-between items-center bg-red-800 shrink-0 shadow-lg">
                                <div className="flex flex-col text-white">
                                    <h2 className="text-4xl font-black text-yellow-500 flex items-center gap-6 biaukai-subtitle tracking-widest uppercase"><Icon name="settings" size={48}/> 題庫管理中心</h2>
                                    <p className="text-yellow-200/50 text-xl font-serif mt-1 italic">選取題目或拖曳變更順序 (共 {riddlePool.length} 題)</p>
                                </div>
                                <button onClick={() => { sound.playClick(); setView('menu'); }} className="bg-yellow-600 text-red-950 px-10 py-4 rounded-2xl text-2xl font-black shadow-md hover:bg-yellow-500 transition-all flex items-center gap-3 border-b-4 border-yellow-800 biaukai-subtitle">確認返回</button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-8 custom-scrollbar bg-red-950 min-h-0">
                                <div className="max-w-6xl mx-auto w-full space-y-6 pb-20">
                                    <div className="bg-red-900/60 p-4 rounded-2xl border-2 border-yellow-600/20 shadow-inner shrink-0 mb-8">
                                        <div className="flex items-center gap-4">
                                            <div className="flex items-center gap-2 shrink-0">
                                                <Icon name="plus" size={24} className="text-yellow-400"/><span className="text-xl font-black text-yellow-400 biaukai-subtitle">新增題目</span>
                                            </div>
                                            <input type="text" placeholder="種類" value={newRiddle.category} onChange={e => setNewRiddle(s => ({...s, category: e.target.value}))} className="w-32 bg-red-950 border border-yellow-600/30 rounded-xl px-4 py-2 text-xl outline-none focus:border-yellow-400 text-white shrink-0" />
                                            <input type="text" placeholder="謎題內容" value={newRiddle.question} onChange={e => setNewRiddle(s => ({...s, question: e.target.value}))} className="flex-1 bg-red-950 border border-yellow-600/30 rounded-xl px-4 py-2 text-xl outline-none focus:border-yellow-400 text-white" />
                                            <input type="text" placeholder="謎底" value={newRiddle.answer} onChange={e => setNewRiddle(s => ({...s, answer: e.target.value}))} className="w-48 bg-red-950 border border-yellow-600/30 rounded-xl px-4 py-2 text-xl outline-none focus:border-yellow-400 text-white shrink-0" />
                                            <button onClick={addNewRiddle} className="bg-yellow-600 text-red-950 px-8 py-2 rounded-xl font-black hover:bg-yellow-500 shadow-md text-xl shrink-0 transition-all border-b-2 border-yellow-800 biaukai-subtitle">新增</button>
                                        </div>
                                    </div>
                                    <div className="grid gap-2">
                                        {riddlePool.map((r, idx) => (
                                            <div key={r.id} draggable onDragStart={() => handleDragStart(idx)} onDragOver={(e)=>e.preventDefault()} onDrop={() => handleDrop(idx)}
                                                className={`bg-red-900/40 p-3 rounded-2xl border border-yellow-600/10 flex items-center justify-between group cursor-grab hover:bg-red-900 transition-all ${draggedIdx === idx ? 'opacity-20 shadow-none' : 'shadow-md'}`} >
                                                <div className="flex items-center gap-5 flex-1 text-white overflow-hidden">
                                                    <Icon name="grip" size={20} className="text-yellow-600/20" />
                                                    <div className="text-2xl font-black text-yellow-500/60 w-10 text-center">#{idx + 1}</div>
                                                    <button onClick={() => { sound.playClick(); const n = new Set(selectedPoolIds); if(n.has(r.id)) n.delete(r.id); else n.add(r.id); setSelectedPoolIds(n); }} className={`w-10 h-10 rounded-xl border flex items-center justify-center transition-all ${selectedPoolIds.has(r.id) ? 'bg-yellow-500 border-yellow-200 text-red-950 shadow-inner' : 'border-yellow-600/20 text-transparent'}`} ><Icon name="check" size={20} /></button>
                                                    <div className="flex flex-col ml-4">
                                                        <span className="text-[10px] text-yellow-500/40 font-black uppercase tracking-widest">{r.category}</span>
                                                        <span className="text-2xl font-medium line-clamp-1 opacity-95">{r.question}</span>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-10 pr-6 shrink-0 text-white font-serif">
                                                    <span className="text-xl text-yellow-400 font-mono bg-black/30 px-5 py-2 rounded-xl border border-yellow-900/30 shadow-inner">答案: {r.answer}</span>
                                                    <button onClick={() => { sound.playClick(); setRiddlePool(prev => prev.filter(x => x.id !== r.id)); }} className="text-red-500 opacity-0 group-hover:opacity-100 p-2 hover:bg-red-500/20 rounded-full transition-all"><Icon name="trash" size={28} /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <Footer isSmall />
                        </div>
                    )}

                    {view === 'result' && (
                        <div className="flex flex-col justify-center items-center h-full w-full space-y-8 px-4 text-white">
                            <div className="text-[10rem]">🎇</div>
                            <h2 className="text-7xl font-black text-yellow-500 drop-shadow-2xl biaukai-subtitle">燈謎大會圓滿結束</h2>
                            <div className="bg-red-900/50 p-12 rounded-[4rem] border-2 border-yellow-600/30 min-w-[500px] text-center shadow-xl">
                                <p className="text-5xl mb-8 font-black font-serif uppercase tracking-widest text-yellow-50">總耗時：<span className="text-yellow-400 font-mono">{formatTime(timer)}</span></p>
                                {mode === 'group' && (
                                    <div className="space-y-4 pt-4 border-t border-yellow-600/20 text-white">
                                        {[...Array(teamCount)].map((_, i) => (
                                            <div key={i} className={`flex justify-between items-center text-4xl px-12 py-5 rounded-[2rem] ${scores[i] === Math.max(...Object.values(scores)) ? 'bg-yellow-600/30 border-2 border-yellow-500 shadow-xl' : 'bg-black/60'}`}>
                                                <span className="font-serif font-bold">第 {i + 1} 組</span>
                                                <span className="font-black text-yellow-400">{(scores[i] || 0).toString()} 分</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <button onClick={() => { sound.playClick(); setView('menu'); }} className="bg-yellow-600 text-red-950 px-24 py-8 rounded-[4rem] text-5xl font-black shadow-xl border-b-[10px] border-yellow-800 active:translate-y-2 transition-all biaukai-subtitle uppercase">回主畫面</button>
                            <Footer isSmall />
                        </div>
                    )}

                    {selectedRiddle && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-2 sm:p-4 bg-black/95 backdrop-blur-2xl animate-in fade-in">
                            <div className={`bg-red-800 border-[8px] rounded-[5rem] max-w-5xl w-full h-[95vh] shadow-2xl relative flex flex-col items-center p-8 md:p-10 space-y-4 transition-all duration-300
                                ${feedback === 'correct' ? 'border-green-500 scale-105 shadow-[0_0_50px_rgba(34,197,94,0.4)]' : feedback === 'wrong' ? 'border-red-500 animate-shake shadow-[0_0_50px_rgba(239,68,68,0.4)]' : 'border-yellow-500'}`}>
                                
                                {mode === 'group' && (
                                    <div className="absolute top-6 left-10 pointer-events-none z-50">
                                        <div className="bg-white/95 backdrop-blur-lg text-red-950 px-8 py-2 rounded-full font-black shadow-2xl border border-red-900/10 text-3xl biaukai-subtitle">
                                            第 {activeTeamIdx + 1} 組
                                        </div>
                                    </div>
                                )}

                                <div className="inline-block px-12 py-3 bg-yellow-600 text-red-950 rounded-full text-2xl font-black shadow-lg border-b-6 border-yellow-800 shrink-0 biaukai-subtitle">
                                    {selectedRiddle.category} 謎題
                                </div>

                                <div className="flex-1 w-full flex flex-col items-center justify-center min-h-0 space-y-4 md:space-y-6 overflow-hidden py-4 text-white text-center">
                                    <h3 className="font-black leading-tight text-yellow-50 drop-shadow-lg max-w-4xl biaukai-subtitle"
                                        style={{ fontSize: 'clamp(1.5rem, 4.5vh, 4.2rem)' }}>
                                        {selectedRiddle.question}
                                    </h3>

                                    <div className="flex justify-center gap-3 flex-wrap shrink-0">
                                        {[...selectedRiddle.answer].map((char, i) => (
                                            <div key={i} className={`w-14 h-14 sm:w-18 sm:h-18 md:w-20 md:h-20 border-2 rounded-[1.2rem] flex items-center justify-center text-4xl sm:text-5xl font-black transition-all ${i < hintLevel || showFullAnswer ? 'bg-yellow-500 text-red-950 border-yellow-200 shadow-xl' : 'bg-red-950/50 border-yellow-600/30 text-transparent'}`}>
                                                <span className="leading-none">{(i < hintLevel || showFullAnswer) ? char : '?'}</span>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="w-full max-w-4xl flex flex-col space-y-6 shrink-0">
                                        {!showFullAnswer && (
                                            <input autoFocus type="text" placeholder="在此輸入謎底..." value={userInput} onChange={(e) => setUserInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && checkAnswer()}
                                                className={`w-full bg-red-950 border-4 rounded-[2.5rem] px-8 py-3 sm:py-5 text-3xl sm:text-4xl text-center outline-none focus:border-yellow-400 text-white shadow-inner shrink-0 transition-all
                                                ${feedback === 'wrong' ? 'border-red-500' : 'border-yellow-600/40'}`} />
                                        )}
                                        
                                        <div className="grid grid-cols-4 gap-3 sm:gap-4 shrink-0 h-16 sm:h-20 biaukai-subtitle font-black">
                                            <button onClick={() => { if(hintLevel < selectedRiddle.answer.length) { sound.playClick(); setHintLevel(h => h+1); } }} disabled={hintLevel >= selectedRiddle.answer.length || showFullAnswer} 
                                                className="rounded-2xl bg-red-600 hover:bg-red-500 text-white shadow-xl active:translate-y-1 flex items-center justify-center gap-2 transition-all border border-red-400/30 disabled:opacity-30 text-3xl">
                                                提示
                                            </button>
                                            <button onClick={() => { sound.playClick(); setShowFullAnswer(true); setUserInput(selectedRiddle.answer); }} disabled={showFullAnswer} 
                                                className="rounded-2xl bg-red-800 hover:bg-red-700 text-white shadow-xl active:translate-y-1 flex items-center justify-center gap-2 transition-all border border-red-400/30 disabled:opacity-30 text-3xl">
                                                公布
                                            </button>
                                            <button onClick={() => { sound.playClick(); setSelectedRiddle(null); }} 
                                                className="rounded-2xl bg-[#5c1a1a] hover:bg-red-900 text-white shadow-xl active:translate-y-1 flex items-center justify-center transition-all border border-red-400/20 text-3xl">
                                                離開
                                            </button>
                                            <button onClick={checkAnswer} 
                                                className="rounded-2xl bg-yellow-500 hover:bg-yellow-400 text-red-950 font-black shadow-2xl active:translate-y-1 border-b-6 border-yellow-700 transition-all flex items-center justify-center text-4xl">
                                                {showFullAnswer ? '下一題' : '提交'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
