<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數字連線紙本產生器 - 專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

        :root {
            --number-size: 70px;
            --font-size: 31.5px;
            --a4-width: 210mm;
            --a4-height: 297mm;
            --primary-color: #2563eb;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            color: #1e293b;
            overflow-x: hidden;
        }

        /* --- A4 預覽邏輯 --- */
        #preview-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        /* 在螢幕上縮放 A4 頁面以適應手機螢幕 */
        .a4-wrapper {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .a4-page {
            background-color: white;
            width: var(--a4-width);
            height: var(--a4-height);
            padding: 15mm;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            transform-origin: top center;
        }

        /* 手機端自動縮放預覽 */
        @media (max-width: 850px) {
            #preview-area { padding: 10px; }
            .a4-page {
                transform: scale(calc(100vw / 850)); /* 動態計算縮放比例 */
            }
            .a4-wrapper {
                height: calc(var(--a4-height) * (100vw / 850));
            }
        }

        /* --- 遊戲區樣式 --- */
        .game-board {
            flex-grow: 1;
            position: relative;
            border: 3px solid #000;
            margin-top: 5mm;
            box-sizing: border-box;
            overflow: hidden;
            background-color: #fff;
        }

        .number-item {
            position: absolute;
            width: var(--number-size);
            height: var(--number-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--font-size);
            font-weight: bold;
            border: 2.5px solid #000;
            border-radius: 50%;
            background: white;
            user-select: none;
            box-sizing: border-box;
            z-index: 10;
        }

        /* --- 控制面板樣式 --- */
        #controls {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #controls.collapsed {
            transform: translateY(-100%);
        }

        .control-trigger {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            background: #1e293b;
            color: white;
            padding: 4px 20px;
            border-radius: 0 0 15px 15px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .control-trigger:hover {
            padding-top: 8px;
            background: var(--primary-color);
        }

        input[type="range"] {
            accent-color: var(--primary-color);
        }

        /* --- 列印修正 --- */
        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; }
            #controls, .no-print, .control-trigger { display: none !important; }
            #preview-area { padding: 0; margin: 0; }
            .a4-wrapper { height: auto; margin: 0; }
            .a4-page {
                transform: none !important;
                box-shadow: none !important;
                margin: 0 !important;
                page-break-after: always;
            }
            .a4-page:last-child { page-break-after: avoid; }
        }

        /* 骨架屏動畫 */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading-text { animation: pulse 1.5s infinite; }
    </style>
</head>
<body class="pb-10">

    <div id="controls" class="no-print shadow-sm overflow-hidden">
        <div class="max-w-6xl mx-auto p-4 md:p-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-2">
                <div>
                    <h1 class="text-xl font-bold text-blue-700">數字連線紙本產生器</h1>
                    <p class="text-xs text-slate-500">專為職能訓練與視覺搜尋設計</p>
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <button onclick="generateBatch()" class="flex-1 md:flex-none bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition active:scale-95 shadow-md">
                        🔄 重新生成
                    </button>
                    <button onclick="window.print()" class="flex-1 md:flex-none bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-emerald-700 transition active:scale-95 shadow-md">
                        🖨️ 列印 / PDF
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- 第一欄 -->
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <h3 class="text-sm font-bold text-slate-700 mb-3 border-l-4 border-blue-500 pl-2">數量設定</h3>
                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span>目標點數量</span>
                                <span class="font-bold text-blue-600"><span id="val_targetCount">10</span> <small id="max_targetCount" class="text-slate-400 font-normal"></small></span>
                            </div>
                            <input type="range" id="targetCount" class="w-full" value="10" min="2" max="50" oninput="checkCapacity()">
                        </div>
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span>干擾點數量</span>
                                <span class="font-bold text-blue-600"><span id="val_noiseCount">0</span> <small id="max_noiseCount" class="text-slate-400 font-normal"></small></span>
                            </div>
                            <input type="range" id="noiseCount" class="w-full" value="0" min="0" max="40" oninput="checkCapacity()">
                        </div>
                    </div>
                </div>

                <!-- 第二欄 -->
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <h3 class="text-sm font-bold text-slate-700 mb-3 border-l-4 border-amber-500 pl-2">挑戰模式</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="flex flex-col p-2 bg-white rounded border cursor-pointer hover:bg-blue-50 transition">
                            <input type="radio" name="mode" value="sequential" checked onchange="generateBatch()" class="mb-1">
                            <span class="text-xs font-bold text-center">1, 2, 3...</span>
                            <span class="text-[10px] text-slate-500 text-center">標準序數</span>
                        </label>
                        <label class="flex flex-col p-2 bg-white rounded border cursor-pointer hover:bg-blue-50 transition">
                            <input type="radio" name="mode" value="random" onchange="generateBatch()" class="mb-1">
                            <span class="text-xs font-bold text-center">進階隨機</span>
                            <span class="text-[10px] text-slate-500 text-center">跳號數列</span>
                        </label>
                    </div>
                    <div class="mt-3 space-y-2">
                        <label class="flex items-center gap-2 cursor-pointer text-sm">
                            <input type="checkbox" id="allowRotation" onchange="generateBatch()" class="w-4 h-4"> 數字旋轉 (空間辨識)
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer text-sm">
                            <input type="checkbox" id="allowColor" onchange="generateBatch()" class="w-4 h-4"> 背景顏色 (視覺干擾)
                        </label>
                    </div>
                </div>

                <!-- 第三欄 -->
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <h3 class="text-sm font-bold text-slate-700 mb-3 border-l-4 border-emerald-500 pl-2">視覺大小</h3>
                    <div>
                        <div class="flex justify-between text-sm mb-1">
                            <span>圓圈直徑</span>
                            <span class="font-bold text-blue-600"><span id="val_dotSize">70</span>px</span>
                        </div>
                        <input type="range" id="dotSize" class="w-full" value="70" min="35" max="110" oninput="checkCapacity()">
                    </div>
                    <div class="mt-3">
                        <label class="text-sm block mb-1">一次產生份數</label>
                        <input type="number" id="copyCount" value="1" min="1" max="20" class="w-full px-3 py-1 rounded border text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
            </div>
            
            <div class="mt-4 pt-4 border-t text-center">
                <a href="https://www.facebook.com/mpotkevin" target="_blank" class="text-xs text-slate-400 hover:text-blue-600 transition underline underline-offset-4">設計：職能治療師 - 鄭凱文</a>
            </div>
        </div>
    </div>

    <!-- 面板隱藏/顯示觸發器 -->
    <div id="togglePanel" class="control-trigger no-print font-bold text-xs">
        <span id="trigger-text">隱藏設定選單</span>
    </div>

    <!-- 預覽區域 -->
    <div id="preview-area">
        <div id="pagesContainer" class="w-full flex flex-col items-center">
            <!-- 動態生成頁面 -->
        </div>
    </div>

    <script>
        const controls = document.getElementById('controls');
        const trigger = document.getElementById('togglePanel');
        const triggerText = document.getElementById('trigger-text');
        
        trigger.onclick = () => {
            controls.classList.toggle('collapsed');
            if (controls.classList.contains('collapsed')) {
                triggerText.innerText = "顯示設定選單";
                trigger.style.top = "0";
            } else {
                triggerText.innerText = "隱藏設定選單";
            }
        };

        function updateStyles() {
            const size = document.getElementById('dotSize').value;
            document.documentElement.style.setProperty('--number-size', size + 'px');
            document.documentElement.style.setProperty('--font-size', (size * 0.45) + 'px');
            document.getElementById('val_dotSize').innerText = size;
        }

        function checkCapacity() {
            const targetEl = document.getElementById('targetCount');
            const noiseEl = document.getElementById('noiseCount');
            const dotSize = parseInt(document.getElementById('dotSize').value);

            // A4 內容區估算 (180mm x 200mm)
            const approxWidth = 680; 
            const approxHeight = 700;
            
            const safeDistance = dotSize * 1.35; 
            const maxCols = Math.floor(approxWidth / safeDistance);
            const maxRows = Math.floor(approxHeight / safeDistance);
            const totalMax = Math.max(5, Math.floor(maxCols * maxRows * 0.75));

            const currentTarget = parseInt(targetEl.value);
            const currentNoise = parseInt(noiseEl.value);

            const targetLimit = Math.max(2, totalMax - currentNoise);
            targetEl.max = targetLimit;
            document.getElementById('max_targetCount').innerText = `(上限: ${targetLimit})`;

            const noiseLimit = Math.max(0, totalMax - currentTarget);
            noiseEl.max = noiseLimit;
            document.getElementById('max_noiseCount').innerText = `(上限: ${noiseLimit})`;

            if (currentTarget > targetLimit) targetEl.value = targetLimit;
            if (currentNoise > noiseLimit) noiseEl.value = noiseLimit;

            document.getElementById('val_targetCount').innerText = targetEl.value;
            document.getElementById('val_noiseCount').innerText = noiseEl.value;
            
            updateStyles();
            generateBatch();
        }

        function generateBatch() {
            const container = document.getElementById('pagesContainer');
            const copyCount = Math.min(20, parseInt(document.getElementById('copyCount').value) || 1);
            
            // 避免頻繁重建 DOM 造成的卡頓
            container.innerHTML = '<div class="no-print py-20 loading-text text-xl font-bold text-slate-300">正在優化佈局中...</div>';
            
            setTimeout(() => {
                container.innerHTML = '';
                for (let i = 0; i < copyCount; i++) {
                    const data = createSinglePage(i);
                    container.appendChild(data.wrapper);
                    renderItems(data);
                }
            }, 100);
        }

        function createSinglePage(idx) {
            const targetCount = parseInt(document.getElementById('targetCount').value);
            const noiseCount = parseInt(document.getElementById('noiseCount').value);
            const mode = document.querySelector('input[name="mode"]:checked').value;
            const allowRotation = document.getElementById('allowRotation').checked;
            const allowColor = document.getElementById('allowColor').checked;

            const wrapper = document.createElement('div');
            wrapper.className = 'a4-wrapper';
            
            const page = document.createElement('div');
            page.className = 'a4-page';
            
            let targetNumbers = [];
            let instructionText = "";
            let seqHtml = "";

            if (mode === 'sequential') {
                instructionText = `從數字 1 開始，依序 (1 → 2 → 3...) 連接到 ${targetCount}。`;
                for (let i = 1; i <= targetCount; i++) targetNumbers.push(i);
            } else {
                instructionText = `請按照下方的「指定數列」順序進行連線。`;
                let pool = Array.from({length: 99}, (_, i) => i + 1);
                for (let i = 0; i < targetCount; i++) {
                    const rIdx = Math.floor(Math.random() * pool.length);
                    targetNumbers.push(pool.splice(rIdx, 1)[0]);
                }
                seqHtml = `
                    <div class="mt-2">
                        <p class="text-[10px] text-slate-400 italic mb-1 text-center">連線順序：</p>
                        <div class="text-xl font-black tracking-widest text-center border-2 border-dashed border-slate-300 p-2 bg-slate-50 rounded">
                            ${targetNumbers.join(' → ')}
                        </div>
                    </div>
                `;
            }

            page.innerHTML = `
                <div class="header-section text-center">
                    <h2 class="text-4xl font-bold mb-4 tracking-tighter">數字連線測驗</h2>
                    <div class="bg-white p-4 border-2 border-black rounded-xl">
                        <p class="text-lg font-bold text-black italic">作答說明：${instructionText}</p>
                        ${seqHtml}
                    </div>
                    <div class="flex justify-between text-lg mt-6 px-4 font-bold border-b-2 border-black pb-2">
                        <span>姓名：________________</span>
                        <span>日期：________________</span>
                        <span class="text-sm font-normal">No. ${idx + 1}</span>
                    </div>
                </div>
                <div class="game-board"></div>
            `;

            wrapper.appendChild(page);

            const items = targetNumbers.map(v => ({ value: v, isTarget: true }));
            let added = 0;
            while (added < noiseCount) {
                let v = Math.floor(Math.random() * 99) + 1;
                if (!items.find(it => it.value === v)) {
                    items.push({ value: v, isTarget: false });
                    added++;
                }
            }

            return { 
                wrapper, 
                board: page.querySelector('.game-board'), 
                items: items.sort(() => Math.random() - 0.5),
                allowRotation, 
                allowColor 
            };
        }

        function renderItems(data) {
            const { board, items, allowRotation, allowColor } = data;
            const dotSize = parseInt(document.getElementById('dotSize').value);
            const bWidth = board.clientWidth || 680;
            const bHeight = board.clientHeight || 730;
            
            const colors = ['#f1f5f9', '#fee2e2', '#fef3c7', '#dcfce7', '#dbeafe', '#f3e8ff'];
            const placed = [];
            const minDist = dotSize * 1.2;

            items.forEach(item => {
                const el = document.createElement('div');
                el.className = 'number-item transition-all duration-500';
                el.innerText = item.value;

                if (allowRotation) {
                    const angle = Math.floor(Math.random() * 120) - 60;
                    el.style.transform = `rotate(${angle}deg)`;
                }

                if (allowColor) {
                    el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                }

                let x, y, attempts = 0;
                while (attempts < 1000) {
                    x = Math.random() * (bWidth - dotSize - 20) + 10;
                    y = Math.random() * (bHeight - dotSize - 20) + 10;
                    
                    const tooClose = placed.some(p => Math.hypot(p.x - x, p.y - y) < minDist);
                    if (!tooClose) break;
                    attempts++;
                }

                placed.push({x, y});
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                board.appendChild(el);
            });
        }

        window.onload = () => {
            checkCapacity();
        };

        // 監聽視窗大小變化以修正手機端縮放
        let resizeTimer;
        window.onresize = () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                location.reload(); // 簡單處理：手機旋轉時重新計算縮放
            }, 300);
        };
    </script>
</body>
</html>
